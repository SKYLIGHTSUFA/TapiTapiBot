<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ДАСКО – Админка акции «Тапитапи»{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f5e7d9 0%, #e8d5c4 100%);
            font-family: 'Roboto', sans-serif;
        }
        /* Сайдбар слева, фиксированной ширины */
        .sidebar {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            width: 260px;
            background: linear-gradient(180deg, #3e1a1a 0%, #2c0f0f 100%);
            color: #f5e7d9;
            font-family: 'Playfair Display', serif;
            border-right: 2px solid #c9a87b;
            overflow-y: auto;
            z-index: 1000;
        }
        .sidebar .nav-link {
            color: #f5e7d9;
            font-size: 1rem;
            padding: 10px 20px;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }
        .sidebar .nav-link:hover {
            background-color: #5c2a2a;
            border-left-color: #e6b17e;
        }
        .content {
            margin-left: 260px;
            padding: 20px;
            min-height: 100vh;
        }
        .main-card {
            background: rgba(255,255,245,0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .card-stats {
            border: none;
            border-radius: 16px;
            background: linear-gradient(145deg, #fff9f0, #fef3e4);
            box-shadow: 5px 5px 12px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card-stats:hover {
            transform: translateY(-5px);
            box-shadow: 10px 10px 20px rgba(0,0,0,0.12);
        }
        .btn-primary {
            background-color: #8b3c3c;
            border-color: #6d2e2e;
        }
        .btn-primary:hover {
            background-color: #6d2e2e;
            border-color: #5a2424;
        }
        .btn-success {
            background-color: #5f7a4b;
            border-color: #4f643d;
        }
        .btn-info {
            background-color: #c9a87b;
            border-color: #b89466;
            color: #2c0f0f;
        }
        h1, h2, h3, .card-title {
            font-family: 'Playfair Display', serif;
            color: #3e1a1a;
        }
        .table {
            background-color: #fffcf8;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .table thead tr {
            background-color: #8b3c3c;
            color: #f5e7d9;
        }
        .pagination .page-link {
            color: #8b3c3c;
            background-color: #fff9f0;
            border-color: #dcc8b0;
        }
        .pagination .active .page-link {
            background-color: #8b3c3c;
            border-color: #8b3c3c;
            color: white;
        }
        .modal-content {
            background-color: #fffcf5;
            border-radius: 20px;
        }
        .modal-header {
            background-color: #8b3c3c;
            color: white;
            border-radius: 20px 20px 0 0;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8rem;
            color: #6d4c3c;
            border-top: 1px solid #dcc8b0;
            padding-top: 15px;
        }
        ::selection {
            background-color: #d9b382;
            color: #2c0f0f;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Сайдбар -->
    <div class="sidebar">
        <div class="text-center py-4">
            <img src="/static/logo.png" alt="ДАСКО" style="max-width: 80px; margin-bottom: 10px;">
            <h5 style="color: #e6b17e;">ДАСКО</h5>
            <small style="color: #c9a87b;">администратор</small>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" href="/admin">Дашборд</a></li>
            <li class="nav-item"><a class="nav-link" href="/admin/receipts">Чеки</a></li>
            <li class="nav-item"><a class="nav-link" href="/admin/tickets">Билеты</a></li>
            <li class="nav-item"><a class="nav-link" href="/admin/users">Пользователи</a></li>
            <li class="nav-item"><a class="nav-link" href="/admin/draws">Розыгрыши</a></li>
            <li class="nav-item"><a class="nav-link" href="/admin/export">Экспорт данных</a></li>
            <li class="nav-item"><a class="nav-link" href="/admin/logs">Логи</a></li>
        </ul>
    </div>

    <!-- Основной контент -->
    <div class="content">
        <div class="main-card">
            {% block content %}{% endblock %}
            <div class="footer">
                ДАСКО – все права защищены © 2026<br>
                Промо-акция «Тапитапи»
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
